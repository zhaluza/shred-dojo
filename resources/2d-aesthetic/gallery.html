<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>ハイパースペース · scenes</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        background: #05040a;
        overflow: hidden;
      }
      body {
        font-family:
          ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        -webkit-font-smoothing: none;
        touch-action: none;
      }
      #screen {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* album-plate title, top-centre */
      #title {
        position: absolute;
        left: 50%;
        top: 18px;
        transform: translateX(-50%);
        text-align: center;
        pointer-events: none;
        user-select: none;
        z-index: 4;
      }
      #title .kana {
        font-size: clamp(20px, 5vw, 44px);
        font-weight: 800;
        letter-spacing: 0.12em;
        color: #ff2d6b;
        text-shadow:
          2px 0 #16e6d0,
          -2px 0 #ff2d6b,
          0 0 18px rgba(255, 45, 107, 0.35);
      }
      #title .kana::after {
        /* scanline stripes across the title */
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent 0 2px,
          rgba(5, 4, 10, 0.55) 2px 4px
        );
        pointer-events: none;
      }
      #title .kana {
        position: relative;
        display: inline-block;
        padding: 0 4px;
      }
      #title .sub {
        margin-top: 6px;
        font-size: clamp(9px, 1.6vw, 12px);
        letter-spacing: 0.34em;
        color: rgba(255, 255, 255, 0.72);
        text-transform: uppercase;
      }

      /* control panel */
      #panel {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
        background: rgba(8, 6, 16, 0.6);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 8px 10px;
        z-index: 5;
        max-width: 94vw;
      }
      .seg {
        display: flex;
        gap: 4px;
      }
      .btn {
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 0.04em;
        color: #c4bedf;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
        transition: all 0.14s;
        white-space: nowrap;
      }
      .btn.on {
        color: #100c1a;
        background: #ff7aa6;
        border-color: #ff7aa6;
      }
      .div {
        width: 1px;
        align-self: stretch;
        background: rgba(255, 255, 255, 0.12);
        margin: 0 2px;
      }
      .small {
        font-size: 10px;
        padding: 5px 8px;
      }
      .small.on {
        background: #7fe6df;
        border-color: #7fe6df;
      }
      .label {
        font-size: 9px;
        letter-spacing: 0.18em;
        color: #7d7798;
        text-transform: uppercase;
        align-self: center;
        padding: 0 2px;
      }
      #hint {
        position: absolute;
        top: 10px;
        right: 12px;
        font-size: 10px;
        color: #6b6589;
        letter-spacing: 0.04em;
        z-index: 4;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="screen"></canvas>
    <div id="title">
      <span class="kana" id="kana">ハイパースペース</span>
      <div class="sub" id="sub">white suit · red car</div>
    </div>
    <div id="hint">1 / 2 / 3 to switch</div>
    <div id="panel">
      <div class="seg" id="sceneSeg">
        <button class="btn on" data-s="0">ハイパースペース</button>
        <button class="btn" data-s="1">ハイパードライブ</button>
        <button class="btn" data-s="2">シティポップ</button>
      </div>
      <div class="div"></div>
      <span class="label">fx</span>
      <div class="seg" id="fxSeg">
        <button class="btn small on" data-fx="dither">dith</button>
        <button class="btn small on" data-fx="scan">scan</button>
        <button class="btn small on" data-fx="grain">grain</button>
        <button class="btn small on" data-fx="aberr">aberr</button>
        <button class="btn small on" data-fx="vig">vig</button>
      </div>
    </div>

    <script>
      "use strict";
      (function () {
        /* ===========================================================================
   ENGINE  — this part never changes between scenes. It is your reusable core.
   1. a tiny low-res buffer, drawn to, then upscaled nearest-neighbour
   2. colour helpers
   3. a single post() pass that applies the "retro" look
   Everything below ENGINE is a SCENE: a draw(t) function that paints the buffer.
   =========================================================================== */
        const screen = document.getElementById("screen");
        const sctx = screen.getContext("2d");
        sctx.imageSmoothingEnabled = false;
        const buf = document.createElement("canvas");
        const ctx = buf.getContext("2d", { willReadFrequently: true });
        let W = 0,
          H = 0;
        const TARGET_H = 220;

        function resize() {
          const w = innerWidth,
            h = innerHeight,
            dpr = Math.min(devicePixelRatio || 1, 2);
          screen.width = Math.round(w * dpr);
          screen.height = Math.round(h * dpr);
          screen.style.width = w + "px";
          screen.style.height = h + "px";
          sctx.imageSmoothingEnabled = false;
          H = TARGET_H;
          W = Math.max(180, Math.min(680, Math.round(TARGET_H * (w / h))));
          buf.width = W;
          buf.height = H;
          ctx.imageSmoothingEnabled = false;
          if (SCENES[cur].init) SCENES[cur].init();
        }
        addEventListener("resize", resize);

        // ---- colour helpers ----
        const hx = (h) => {
          const n = parseInt(h.slice(1), 16);
          return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
        };
        const lerp = (a, b, t) => a + (b - a) * t;
        const mix = (a, b, t) => [
          lerp(a[0], b[0], t),
          lerp(a[1], b[1], t),
          lerp(a[2], b[2], t),
        ];
        const rgb = (a) => `rgb(${a[0] | 0},${a[1] | 0},${a[2] | 0})`;
        const rgba = (a, al) =>
          `rgba(${a[0] | 0},${a[1] | 0},${a[2] | 0},${al})`;
        const clamp = (x, a, b) => (x < a ? a : x > b ? b : x);
        const smooth = (t) => t * t * (3 - 2 * t);
        function rng(seed) {
          let s = seed >>> 0;
          return () => {
            s = (s * 1664525 + 1013904223) >>> 0;
            return s / 4294967296;
          };
        }

        // vertical gradient fill helper (top->mid->bottom over [0,y1])
        function vGrad(y0, y1, top, mid, bot) {
          const g = ctx.createLinearGradient(0, y0, 0, y1);
          g.addColorStop(0, rgb(top));
          g.addColorStop(0.55, rgb(mid));
          g.addColorStop(1, rgb(bot));
          return g;
        }
        function pixelDisc(cx, cy, r, fill) {
          cx |= 0;
          cy |= 0;
          r |= 0;
          ctx.fillStyle = fill;
          for (let y = -r; y <= r; y++) {
            const w = Math.floor(Math.sqrt(r * r - y * y));
            ctx.fillRect(cx - w, cy + y, w * 2 + 1, 1);
          }
        }

        // ---- the retro post pass: dither + scanlines + grain + chromatic split ----
        const BAYER = [
          0, 8, 2, 10, 12, 4, 14, 6, 3, 11, 1, 9, 15, 7, 13, 5,
        ].map((v) => v / 16 - 0.5);
        let gseed = 1;
        function post(fx) {
          const img = ctx.getImageData(0, 0, W, H),
            d = img.data;
          const levels = 26,
            step = 255 / (levels - 1);
          gseed = (gseed * 16807) % 2147483647;
          let g = gseed;
          const src = fx.aberr ? new Uint8ClampedArray(d) : null;
          for (let y = 0; y < H; y++) {
            const scan = fx.scan ? (y & 1 ? -16 : 0) : 0;
            for (let x = 0; x < W; x++) {
              const i = (y * W + x) * 4;
              let r, gg, b;
              if (fx.aberr) {
                const xl = x > 0 ? x - 1 : 0,
                  xr = x < W - 1 ? x + 1 : W - 1;
                r = src[(y * W + xl) * 4];
                gg = src[i + 1];
                b = src[(y * W + xr) * 4 + 2];
              } else {
                r = d[i];
                gg = d[i + 1];
                b = d[i + 2];
              }
              if (fx.dither) {
                const dd = BAYER[(y & 3) * 4 + (x & 3)] * step;
                r = Math.round((r + dd) / step) * step;
                gg = Math.round((gg + dd) / step) * step;
                b = Math.round((b + dd) / step) * step;
              }
              if (scan) {
                r += scan;
                gg += scan;
                b += scan;
              }
              if (fx.grain) {
                g = (g * 1103515245 + 12345) & 0x7fffffff;
                const n = ((g >> 16) & 63) - 31;
                r += n * 0.5;
                gg += n * 0.5;
                b += n * 0.5;
              }
              d[i] = r;
              d[i + 1] = gg;
              d[i + 2] = b;
            }
          }
          ctx.putImageData(img, 0, 0);
        }
        function blit(vig) {
          const sw = screen.width,
            sh = screen.height,
            sc = Math.max(sw / W, sh / H);
          const dw = Math.ceil(W * sc),
            dh = Math.ceil(H * sc),
            ox = (sw - dw) / 2,
            oy = (sh - dh) / 2;
          sctx.clearRect(0, 0, sw, sh);
          sctx.drawImage(buf, ox, oy, dw, dh);
          if (vig) {
            const v = sctx.createRadialGradient(
              sw / 2,
              sh / 2,
              sh * 0.2,
              sw / 2,
              sh / 2,
              sh * 0.78,
            );
            v.addColorStop(0, "rgba(0,0,0,0)");
            v.addColorStop(1, "rgba(0,0,0,.5)");
            sctx.fillStyle = v;
            sctx.fillRect(0, 0, sw, sh);
          }
        }

        /* ===========================================================================
     SHARED PROPS — reusable pixel "actors" the scenes draw.
     =========================================================================== */
        function carSide(cx, gy, s, body) {
          // wheels (drawn first, behind body)
          pixelDisc(cx - 7 * s, gy - 2.2 * s, 2.4 * s, "#0a0a0e");
          pixelDisc(cx + 7 * s, gy - 2.2 * s, 2.4 * s, "#0a0a0e");
          pixelDisc(cx - 7 * s, gy - 2.2 * s, 1 * s, "#3a3a44");
          pixelDisc(cx + 7 * s, gy - 2.2 * s, 1 * s, "#3a3a44");
          // lower body slab + cabin
          ctx.fillStyle = body;
          ctx.fillRect(cx - 11 * s, gy - 5.2 * s, 22 * s, 3.4 * s);
          ctx.fillRect(cx - 5 * s, gy - 8.4 * s, 12 * s, 3.6 * s);
          // wedge nose (front-right)
          ctx.beginPath();
          ctx.moveTo(cx + 11 * s, gy - 5.2 * s);
          ctx.lineTo(cx + 13 * s, gy - 3.4 * s);
          ctx.lineTo(cx + 11 * s, gy - 1.8 * s);
          ctx.closePath();
          ctx.fill();
          // windows
          ctx.fillStyle = "#0c1a24";
          ctx.fillRect(cx - 4 * s, gy - 7.8 * s, 10 * s, 2.4 * s);
          // pillar + door seam (subtle)
          ctx.fillStyle = rgba(hx(body), 0.55);
          ctx.fillRect(cx - 1 * s, gy - 5.2 * s, 0.6 * s, 3.4 * s);
          // taillight (rear/left) + headlight (front/right)
          ctx.fillStyle = "#ff5648";
          ctx.fillRect(cx - 11.4 * s, gy - 4.8 * s, 1.2 * s, 1.6 * s);
          ctx.fillStyle = "#ffe9b0";
          ctx.fillRect(cx + 12.4 * s, gy - 4.2 * s, 1.2 * s, 1.2 * s);
        }
        function carRear(cx, gy, s) {
          ctx.fillStyle = "#15111a";
          ctx.fillRect(cx - 8 * s, gy - 4.2 * s, 16 * s, 4.2 * s); // lower
          ctx.fillRect(cx - 6 * s, gy - 8 * s, 12 * s, 4 * s); // cabin
          ctx.fillStyle = "#0e1c26";
          ctx.fillRect(cx - 5 * s, gy - 7.4 * s, 10 * s, 2.6 * s); // window
          // taillight bar
          ctx.fillStyle = "#ff2a2a";
          ctx.fillRect(cx - 7 * s, gy - 3.6 * s, 14 * s, 1.5 * s);
          return; // glow added by caller if wanted
        }
        function figureSuit(cx, gy, s) {
          const white = "#ece7dc";
          ctx.fillStyle = white;
          ctx.fillRect(cx - 2.4 * s, gy - 7 * s, 1.9 * s, 7 * s); // leg L
          ctx.fillRect(cx + 0.5 * s, gy - 7 * s, 1.9 * s, 7 * s); // leg R
          ctx.fillRect(cx - 2.8 * s, gy - 13.2 * s, 5.6 * s, 6.6 * s); // torso
          ctx.fillRect(cx - 3.2 * s, gy - 13.2 * s, 6.4 * s, 1.6 * s); // shoulders
          ctx.fillRect(cx - 3.2 * s, gy - 12 * s, 1.4 * s, 4.8 * s); // arm down (L)
          ctx.fillRect(cx + 1.7 * s, gy - 16.4 * s, 1.5 * s, 4.2 * s); // arm up (R)
          ctx.fillRect(cx + 1.3 * s, gy - 16.8 * s, 2.4 * s, 1.4 * s); // hand at brow
          ctx.fillStyle = "#e6b894";
          ctx.fillRect(cx - 1.5 * s, gy - 16.6 * s, 3 * s, 3 * s); // head
          ctx.fillStyle = "#d8c089";
          ctx.fillRect(cx - 1.5 * s, gy - 17 * s, 3 * s, 1.1 * s); // hair
        }

        /* ===========================================================================
     SCENE 0 — ハイパースペース  (the cover homage: figure + red car, teal->red sky)
     =========================================================================== */
        const sceneHyperspace = {
          title: ["ハイパースペース", "white suit · red car"],
          draw(t) {
            const horizon = Math.round(H * 0.66);
            // teal sky fading to a warm red haze near the ground (the cover's signature)
            ctx.fillStyle = vGrad(
              0,
              horizon,
              [26, 94, 104],
              [58, 120, 118],
              [150, 70, 58],
            );
            ctx.fillRect(0, 0, W, horizon);
            // hot bloom low on the horizon
            const bx = W * 0.5,
              by = horizon - 2;
            const gl = ctx.createRadialGradient(bx, by, 0, bx, by, W * 0.5);
            gl.addColorStop(0, "rgba(255,120,90,.4)");
            gl.addColorStop(1, "rgba(255,120,90,0)");
            ctx.fillStyle = gl;
            ctx.fillRect(0, 0, W, horizon + 10);
            // slow heat-haze bands
            for (let i = 0; i < 3; i++) {
              const y = horizon - 6 - i * 5 + Math.sin(t * 0.6 + i) * 1.5;
              ctx.fillStyle = "rgba(255,200,170,.05)";
              ctx.fillRect(0, y, W, 2);
            }
            // ground (asphalt) with a faint red cast
            ctx.fillStyle = rgb([40, 26, 30]);
            ctx.fillRect(0, horizon, W, H - horizon);
            ctx.fillStyle = "rgba(150,70,58,.18)";
            ctx.fillRect(0, horizon, W, 3);
            // shadows
            const gy = horizon + Math.round(H * 0.14);
            ctx.fillStyle = "rgba(0,0,0,.35)";
            ctx.fillRect(W * 0.56 - 13, gy - 1, 28, 2); // car shadow
            ctx.fillRect(W * 0.4 - 4, gy - 1, 9, 2); // figure shadow
            // actors
            carSide(W * 0.58, gy, 1.15, "#d11f29");
            figureSuit(W * 0.4, gy, 1.15);
          },
        };

        /* ===========================================================================
     SCENE 1 — ハイパードライブ  (outrun grid + synthwave sun + red car)
     =========================================================================== */
        const sceneHyperdrive = {
          title: ["ハイパードライブ", "endless highway"],
          stars: [],
          init() {
            const r = rng(909);
            this.stars = [];
            for (let i = 0; i < Math.round((W * H) / 700); i++)
              this.stars.push([
                (r() * W) | 0,
                (r() * H * 0.4) | 0,
                0.4 + r() * 0.6,
              ]);
          },
          draw(t) {
            const horizon = Math.round(H * 0.56);
            const skyG = vGrad(
              0,
              horizon,
              [24, 8, 52],
              [120, 30, 96],
              [255, 120, 70],
            );
            ctx.fillStyle = skyG;
            ctx.fillRect(0, 0, W, horizon);
            // stars
            for (const s of this.stars) {
              ctx.fillStyle = rgba([255, 255, 255], s[2] * 0.7);
              ctx.fillRect(s[0], s[1], 1, 1);
            }
            // synthwave sun with horizontal slats
            const sx = W * 0.5,
              sy = horizon - 2,
              R = Math.round(H * 0.2);
            ctx.save();
            ctx.beginPath();
            ctx.arc(sx, sy, R, 0, Math.PI * 2);
            ctx.clip();
            const sg = ctx.createLinearGradient(0, sy - R, 0, sy + R);
            sg.addColorStop(0, "#ffe45e");
            sg.addColorStop(0.5, "#ff7a3c");
            sg.addColorStop(1, "#ff2d8e");
            ctx.fillStyle = sg;
            ctx.fillRect(sx - R, sy - R, 2 * R, 2 * R);
            // slats (re-paint sky-coloured bands over lower half = the cutouts)
            ctx.fillStyle = skyG;
            let yy = sy - R * 0.5,
              i = 0;
            while (yy < sy + R) {
              const gap = 1 + i * 0.3;
              ctx.fillRect(sx - R, yy, 2 * R, gap);
              yy += gap + (1.6 + i * 0.7);
              i++;
            }
            ctx.restore();
            // mountains
            ctx.fillStyle = rgb([40, 12, 60]);
            ctx.beginPath();
            ctx.moveTo(0, horizon);
            const mr = rng(31);
            for (let x = 0; x <= W; x += 6) {
              const m = horizon - (4 + mr() * 14);
              ctx.lineTo(x, m);
            }
            ctx.lineTo(W, horizon);
            ctx.closePath();
            ctx.fill();
            // neon grid floor
            ctx.fillStyle = rgb([10, 4, 22]);
            ctx.fillRect(0, horizon, W, H - horizon);
            const phase = (t * 0.45) % 1;
            ctx.lineWidth = 1;
            // horizontals (scroll toward viewer)
            ctx.strokeStyle = "rgba(34,224,255,.55)";
            for (let k = 0; k < 18; k++) {
              const f = (k + phase) / 18;
              const y = horizon + (H - horizon) * (f * f);
              ctx.beginPath();
              ctx.moveTo(0, y + 0.5);
              ctx.lineTo(W, y + 0.5);
              ctx.stroke();
            }
            // verticals (converge to vanishing point)
            ctx.strokeStyle = "rgba(255,61,240,.45)";
            for (let c = -10; c <= 10; c++) {
              const xb = W / 2 + c * (W / 10);
              ctx.beginPath();
              ctx.moveTo(W / 2, horizon + 0.5);
              ctx.lineTo(xb, H);
              ctx.stroke();
            }
            // car (rear) on the road + taillight glow + reflection
            const cy = horizon + (H - horizon) * 0.34,
              bob = Math.sin(t * 3) * 0.6;
            const gl = ctx.createRadialGradient(
              W / 2,
              cy + bob,
              0,
              W / 2,
              cy + bob,
              16,
            );
            gl.addColorStop(0, "rgba(255,40,40,.5)");
            gl.addColorStop(1, "rgba(255,40,40,0)");
            ctx.fillStyle = gl;
            ctx.fillRect(W / 2 - 20, cy - 14, 40, 28);
            carRear(W / 2, cy + bob, 1.0);
            ctx.fillStyle = "rgba(255,42,42,.25)";
            ctx.fillRect(W / 2 - 7, cy + bob + 1, 14, 3); // road reflection
          },
        };

        /* ===========================================================================
     SCENE 2 — シティポップ  (neon night skyline, rain, parked red car)
     =========================================================================== */
        const sceneCityPop = {
          title: ["シティポップ", "neon · rain · longing"],
          blds: [],
          rain: [],
          init() {
            const r = rng(4242);
            this.blds = [];
            let x = 0;
            const horizon = Math.round(H * 0.6);
            while (x < W) {
              const bw = (5 + r() * 16) | 0,
                bh = ((0.16 + r() * 0.4) * H) | 0;
              const wins = [];
              for (let wy = 0; wy < bh - 3; wy += 3)
                for (let wx = 2; wx < bw - 2; wx += 3)
                  if (r() > 0.45)
                    wins.push([wx, wy, r() > 0.5 ? "#ffd27a" : "#7fe6df"]);
              const neon =
                r() > 0.7 ? (r() > 0.5 ? "#ff3df0" : "#22e0ff") : null;
              this.blds.push({ x, bw, bh, top: horizon - bh, wins, neon });
              x += bw + 1;
            }
            this.rain = [];
            for (let i = 0; i < 70; i++)
              this.rain.push([r() * W, r() * H, 1.5 + r() * 2]);
          },
          draw(t) {
            const horizon = Math.round(H * 0.6);
            ctx.fillStyle = vGrad(
              0,
              H,
              [14, 8, 34],
              [40, 14, 58],
              [90, 22, 70],
            );
            ctx.fillRect(0, 0, W, H);
            // moon
            pixelDisc(W * 0.74, H * 0.2, Math.round(H * 0.05), "#e8e0ee");
            // horizon magenta glow
            const gl = ctx.createLinearGradient(0, horizon - 30, 0, horizon);
            gl.addColorStop(0, "rgba(255,61,200,0)");
            gl.addColorStop(1, "rgba(255,61,200,.3)");
            ctx.fillStyle = gl;
            ctx.fillRect(0, horizon - 30, W, 30);
            // skyline
            for (const b of this.blds) {
              ctx.fillStyle = "#0d0a1c";
              ctx.fillRect(b.x, b.top, b.bw, b.bh);
              const flick = Math.sin(t * 2 + b.x) * 0.5 + 0.5;
              for (const w of b.wins) {
                ctx.fillStyle = rgba(hx(w[2]), 0.35 + 0.5 * flick);
                ctx.fillRect(b.x + w[0], b.top + w[1] + 2, 1, 2);
              }
              if (b.neon) {
                ctx.fillStyle = rgba(hx(b.neon), 0.8);
                ctx.fillRect(
                  b.x + b.bw - 2,
                  b.top + 3,
                  1,
                  Math.min(b.bh - 4, 10),
                );
              }
            }
            // street + reflections
            ctx.fillStyle = rgb([16, 10, 24]);
            ctx.fillRect(0, horizon, W, H - horizon);
            ctx.fillStyle = "rgba(255,61,200,.06)";
            ctx.fillRect(0, horizon, W, H - horizon);
            // streetlamp
            const lx = Math.round(W * 0.3),
              ly = horizon + Math.round(H * 0.1);
            ctx.fillStyle = "#000";
            ctx.fillRect(lx, ly - Math.round(H * 0.2), 1, Math.round(H * 0.2));
            ctx.fillRect(lx - 3, ly - Math.round(H * 0.2), 7, 2);
            const lg = ctx.createRadialGradient(
              lx + 1,
              ly - Math.round(H * 0.2) + 1,
              0,
              lx + 1,
              ly - Math.round(H * 0.2) + 1,
              H * 0.16,
            );
            lg.addColorStop(0, "rgba(255,210,120,.5)");
            lg.addColorStop(1, "rgba(255,210,120,0)");
            ctx.fillStyle = lg;
            ctx.fillRect(0, 0, W, H);
            // parked red car + wet reflection
            const cx = W * 0.6,
              gy = ly + 2;
            ctx.fillStyle = "rgba(0,0,0,.4)";
            ctx.fillRect(cx - 13, gy - 1, 28, 2);
            carSide(cx, gy, 1.0, "#cf1f2a");
            ctx.save();
            ctx.globalAlpha = 0.18;
            ctx.scale(1, -1);
            ctx.translate(0, -(gy * 2));
            carSide(cx, gy, 1.0, "#cf1f2a");
            ctx.restore();
            // rain
            ctx.strokeStyle = "rgba(180,200,255,.25)";
            ctx.lineWidth = 1;
            for (const d of this.rain) {
              d[1] = (d[1] + d[2] * 2.2) % H;
              d[0] = (d[0] + 0.6) % W;
              ctx.beginPath();
              ctx.moveTo(d[0], d[1]);
              ctx.lineTo(d[0] - 1, d[1] + 3);
              ctx.stroke();
            }
          },
        };

        /* ===========================================================================
     LOOP + UI
     =========================================================================== */
        const SCENES = [sceneHyperspace, sceneHyperdrive, sceneCityPop];
        let cur = 0;
        const fx = {
          dither: true,
          scan: true,
          grain: true,
          aberr: true,
          vig: true,
        };
        let tt = 0,
          last = performance.now();

        function frame(now) {
          const dt = Math.min(0.05, (now - last) / 1000);
          last = now;
          tt += dt;
          SCENES[cur].draw(tt);
          post(fx);
          blit(fx.vig);
          requestAnimationFrame(frame);
        }

        function setScene(i) {
          cur = i;
          if (SCENES[i].init) SCENES[i].init();
          const [k, s] = SCENES[i].title;
          document.getElementById("kana").textContent = k;
          document.getElementById("sub").textContent = s;
          [...document.getElementById("sceneSeg").children].forEach((b, j) =>
            b.classList.toggle("on", j === i),
          );
        }
        document.getElementById("sceneSeg").addEventListener("click", (e) => {
          const b = e.target.closest("button");
          if (b) setScene(+b.dataset.s);
        });
        document.getElementById("fxSeg").addEventListener("click", (e) => {
          const b = e.target.closest("button");
          if (!b) return;
          fx[b.dataset.fx] = !fx[b.dataset.fx];
          b.classList.toggle("on", fx[b.dataset.fx]);
        });
        addEventListener("keydown", (e) => {
          if (e.key === "1") setScene(0);
          if (e.key === "2") setScene(1);
          if (e.key === "3") setScene(2);
          if (e.key === "ArrowRight") setScene((cur + 1) % 3);
          if (e.key === "ArrowLeft") setScene((cur + 2) % 3);
        });

        resize();
        setScene(0);
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
